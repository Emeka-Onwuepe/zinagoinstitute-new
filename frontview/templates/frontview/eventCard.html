
  <div class="bg-card border border-border rounded-lg p-6 md:p-8">
    <h3 class="font-heading font-semibold text-xl mb-2">{{event.conference}}</h3>
    <p class="text-sm text-muted-foreground mb-1">Host: {{event.host}}</p>
    
    {% if event.theme %}
            <p class="text-sm text-muted-foreground italic mb-3">Theme: {{event.theme}}</p>
    {% endif %}
        
    <div class="flex flex-wrap gap-4 text-sm text-muted-foreground mb-4">
      <span class="flex items-center gap-1"> <i data-lucide="map-pin" class="text-accent"></i>
        {{event.location}}</span>
      <span class="flex items-center gap-1"><i data-lucide="calendar" class="text-accent"></i>{{event.date}}</span>
    </div>
    <div class="border-t border-border pt-4 mt-2">
      <p class="text-sm text-muted-foreground mb-1">{{event.authors}} ({{event.year}})</p>
      <h4 class="font-heading font-semibold text-base mb-2">{{event.paper}}</h4>
      <p class="text-muted-foreground text-sm leading-relaxed">{{event.summary}}</p>
    </div>
  </div>
